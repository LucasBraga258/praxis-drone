version: '3.8'

services:
  # O nó trabalhador principal do OpenDroneMap (Processa as imagens)
  nodeodm:
    image: opendronemap/nodeodm:latest
    container_name: praxis_nodeodm
    ports:
      - "3000:3000"
    volumes:
      - nodeodm_data:/var/www/data
    restart: unless-stopped
    environment:
      # Max memory allowed (Ajuste baseado na RAM do seu PC, ex: 16gb)
      - max_memory=16384
    deploy:
      resources:
        limits:
          memory: 16G
          # Descomente e ajuste caso precise forçar um limite de CPUs (threads)
          # cpus: '4.0'

volumes:
  nodeodm_data:
    driver: local

# ---------------------------------------------------------
# COMO INICIAR SEU MOTOR FOTOGRAMÉTRICO LOCAL:
# ---------------------------------------------------------
# 1. Garanta que você tem o Docker Desktop instalado (Windows/Mac) ou o docker/docker-compose no Linux.
# 2. Abra o terminal na raiz deste projeto (Praxis Drone).
# 3. Digite: docker-compose up -d
# 4. A API do NodeODM estará viva em: http://localhost:3000
# 5. O serviço `health.ts` da Praxis já vai detectar que o motor acordou.
